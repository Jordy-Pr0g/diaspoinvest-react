name: LinkedIn S1 Mer 01/07 — Carrousel BRVM

on:
  schedule:
    - cron: '45 9 1 7 *'  # 1er juillet 2026 a 11h45 Paris (9h45 UTC)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Publier post LinkedIn
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          POST_TEXT: |
            Tu mets ton epargne sur un Livret A a 1,5% ?

            Il existe une bourse africaine qui verse jusqu'a 6,13% de dividende par an.

            Fais defiler pour tout comprendre.

            8 pays. 47 actions. Ouverte a la diaspora depuis Paris, Montreal ou Dakar.

            Ce carrousel explique ce qu'est la bourse ouest-africaine, les actions qui versent le plus, et comment ouvrir un compte.

            Sauvegarde-le. Tu en auras besoin.

            Et toi, tu en etais ou avec ton epargne avant de decouvrir ca ? Dis-moi en commentaire.

            diaspoinvest.fr

            Contenu educatif. Non affilie a la bourse ni au CREPMF.

            #BourseAfricaine #Diaspora #Investissement
        run: |
          python marketing/post_linkedin_document.py \
            "$POST_TEXT" \
            "content/carrousels/DiaspoInvest Carrousel LinkedIn BRVM.pdf" \
            "La bourse africaine expliquee"
