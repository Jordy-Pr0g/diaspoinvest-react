name: LinkedIn S2 Mer 01/07 — Carrousel SGI

on:
  schedule:
    - cron: '0 10 1 7 *'  # 1er juillet 2026 à 12h Paris (10h UTC)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Publier post LinkedIn
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: |
          python marketing/post_linkedin_action.py "Depuis Paris, tu n'as pas besoin d'aller à Abidjan.

BOA Capital Securities, BNI Securities, CGF Bourse. L'ouverture de compte se fait entièrement à distance.

Fais défiler pour voir les 5 étapes exactes. 👇

Tout ce qu'il faut : une pièce d'identité, un justificatif de domicile, et environ 30 minutes.

Sauvegarde ce carrousel. C'est ta feuille de route.

Tu galères sur quelle étape en ce moment ?

Contenu éducatif. Non affilié à la bourse ni au CREPMF.

#BourseAfricaine #SGI #Investissement"
      - name: Poster carrousel PDF en commentaire
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: |
          POST_ID=$(cat post_id.txt)
          python marketing/post_linkedin_comment.py "$POST_ID" "content/carrousels/DiaspoInvest_Carrousel_S2_SGI_v2.pdf"
