name: LinkedIn S1 Lun 29/06 — Introduction Jordan

on:
  schedule:
    - cron: '0 6 29 6 *'  # 29 juin 2026 à 8h Paris (6h UTC)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Publier post LinkedIn
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          POST_TEXT: |
            Pendant 3 ans j'ai mis mon épargne sur un Livret A.

            1,5% par an. J'étais content. Je ne savais pas qu'il existait mieux.

            Puis j'ai découvert qu'il existe une bourse en Afrique de l'Ouest. Accessible depuis Paris, Montréal ou Dakar. Qui verse jusqu'à 6% de dividendes par an.

            J'ai tout appris seul. Les erreurs, les brokers, la fiscalité, les bons et les mauvais choix.

            Depuis, j'ai créé DiaspoInvest. Pour partager ce que j'ai appris. Sans jargon. Sans te vendre du rêve.

            Chaque semaine ici : comment fonctionne la bourse ouest-africaine, combien ça peut rapporter réellement, et comment éviter les pièges que j'ai faits.

            Si tu fais partie de la diaspora africaine ou si tu vis en Afrique de l'Ouest et que tu veux faire travailler ton épargne.

            Tu es au bon endroit.

            Sauvegarde ce post. On commence mercredi.

            diaspoinvest.fr

            Contenu éducatif. Non affilié à la BRVM ni au CREPMF.

            #Diaspora #Investissement #BourseAfricaine
        run: python marketing/post_linkedin_action.py "$POST_TEXT"
