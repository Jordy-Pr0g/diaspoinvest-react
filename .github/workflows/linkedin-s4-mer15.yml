name: LinkedIn S4 Mer 15/07 — Carrousel 5 Erreurs

on:
  schedule:
    - cron: '0 10 15 7 *'  # 15 juillet 2026 à 12h Paris (10h UTC)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Publier post LinkedIn
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: |
          python marketing/post_linkedin_action.py "Ces 5 erreurs coûtent de l'argent aux débutants sur la bourse ouest-africaine.

J'en ai fait certaines. Voilà comment les éviter.

Swipe. 👇

---

Partage à quelqu'un qui veut investir sur la bourse ouest-africaine.

Tu en reconnais une que tu as faite ou que tu allais faire ?

Contenu éducatif. Non affilié à la bourse ni au CREPMF.

#BourseAfricaine #Erreurs #Investissement"
      - name: Poster carrousel PDF en commentaire
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: |
          POST_ID=$(cat post_id.txt)
          python marketing/post_linkedin_comment.py "$POST_ID" "content/carrousels/DiaspoInvest_Carrousel_S4_Erreurs.pdf"
