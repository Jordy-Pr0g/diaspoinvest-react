    <!-- Mesure d'audience maison (sans cookie, RGPD) — visites SPA + sources + events -->
    <script>
      (function () {
        // Exclusion : si cet appareil est marqué "admin", on ne compte rien.
        try { if (localStorage.getItem('di_admin') === '1') { window.plausible = function () {}; return } } catch (_) {}

        function post(payload) {
          try {
            var body = JSON.stringify(payload || {})
            if (navigator.sendBeacon) navigator.sendBeacon('/api/stats', body)
            else fetch('/api/stats', { method: 'POST', body: body, keepalive: true })
          } catch (_) {}
        }

        // Source du visiteur (une seule fois par session, sur la 1re page).
        // Priorité au paramètre ?src= des liens traçables (les applis mobiles
        // Facebook/LinkedIn n'envoient souvent pas de referrer), puis referrer.
        function classer() {
          try {
            var q = new URLSearchParams(location.search).get('src')
            if (q) {
              q = q.toLowerCase()
              var connus = ['google', 'bing', 'tiktok', 'instagram', 'facebook', 'linkedin', 'youtube', 'twitter', 'whatsapp']
              return connus.indexOf(q) > -1 ? q : 'autre'
            }
            var r = document.referrer
            if (!r) return 'direct'
            var h = new URL(r).hostname.replace(/^www\./, '')
            if (h.indexOf('diaspoinvest') > -1) return ''      // navigation interne, on ignore
            if (/google\./.test(h)) return 'google'
            if (/bing\./.test(h)) return 'bing'
            if (/tiktok/.test(h)) return 'tiktok'
            if (/instagram/.test(h)) return 'instagram'
            if (/facebook|fb\./.test(h)) return 'facebook'
            if (/linkedin/.test(h)) return 'linkedin'
            if (/youtube|youtu\.be/.test(h)) return 'youtube'
            if (/t\.co|twitter|x\.com/.test(h)) return 'twitter'
            if (/whatsapp/.test(h)) return 'whatsapp'
            return 'autre'
          } catch (_) { return 'direct' }
        }
        try {
          if (!sessionStorage.getItem('di_source')) {
            var s = classer()
            sessionStorage.setItem('di_source', s || 'direct')
            if (s) post({ src: s })
          }
        } catch (_) {}

        // Source mémorisée pour la session : sert à attribuer chaque événement
        // (quiz, clic produit, achat) au réseau qui a amené le visiteur.
        function origine() {
          try { return sessionStorage.getItem('di_source') || 'direct' } catch (_) { return 'direct' }
        }

        // Attribution des ACHATS : ajoute la source aux liens de paiement
        // Hotmart (param sck) ; Hotmart le renvoie tel quel dans son webhook.
        document.addEventListener('click', function (ev) {
          try {
            var a = ev.target && ev.target.closest ? ev.target.closest('a[href*="pay.hotmart.com"]') : null
            if (!a) return
            var u = new URL(a.href)
            if (!u.searchParams.get('sck')) { u.searchParams.set('sck', origine()); a.href = u.toString() }
          } catch (_) {}
        }, true)

        // Vue de page, dédupliquée par chemin (compte aussi la navigation SPA)
        var dernier = null
        function pv() {
          if (location.pathname === dernier) return
          dernier = location.pathname
          post({ p: location.pathname })
        }
        pv() // 1re vue

        // Intercepte les navigations React Router (history API) sans recharger
        function hook(type) {
          var orig = history[type]
          return function () { var r = orig.apply(this, arguments); setTimeout(pv, 0); return r }
        }
        history.pushState = hook('pushState')
        history.replaceState = hook('replaceState')
        window.addEventListener('popstate', pv)

        // Conserve les appels d'events existants : window.plausible('quiz_termine', {...})
        // Chaque événement porte la source de session (attribution par réseau).
        window.plausible = function (eventName) { post({ e: eventName, origine: origine() }) }
      })()
    </script>

    <!-- FAQ Schema (aligné sur les questions réellement affichées dans la section FAQ du site, voir src/data.js FAQ_ITEMS) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Et si ça ne me convient pas ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Satisfait ou remboursé, sans condition, pendant 15 jours. Tu envoies un email à contact@diaspoinvest.fr et tu es remboursé dans les 48 h. Aucune question posée." }
        },
        {
          "@type": "Question",
          "name": "Je ne connais rien à la bourse, c'est fait pour moi ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Oui, c'est exactement pour toi. Le guide part de zéro : qu'est-ce que la BRVM, comment ouvrir un compte depuis la diaspora, quelles actions regarder en premier. Tout est expliqué en langage simple, sans jargon financier." }
        },
        {
          "@type": "Question",
          "name": "Combien faut-il minimum pour commencer à investir sur la BRVM ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Il n'y a pas de minimum légal. En pratique, avec 50 000 à 100 000 FCFA (75 à 150 €) tu peux acheter ta première action. Les frais de courtage sont d'environ 0,5 % par ordre. Il vaut mieux commencer petit et régulier plutôt qu'attendre d'avoir une grosse somme." }
        },
        {
          "@type": "Question",
          "name": "Comment envoyer de l'argent depuis la France pour investir ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Tu passes par un virement bancaire international SWIFT vers le compte de ta SGI, ou via des services comme Wave, Orange Money ou Wise selon la SGI choisie. Le guide détaille les options les moins chères et les plus rapides pour la diaspora." }
        },
        {
          "@type": "Question",
          "name": "Quelle SGI recommandes-tu pour la diaspora ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Je ne recommande pas de SGI en particulier car ce n'est pas un conseil en investissement. Le guide compare les critères à vérifier (accès digital, frais, support diaspora) pour que tu fasses ton propre choix en connaissance de cause." }
        },
        {
          "@type": "Question",
          "name": "Puis-je investir depuis la France (ou l'étranger) ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Oui. Certaines SGI proposent un accès 100 % digital adapté à la diaspora. Le guide t'explique les étapes d'ouverture de compte et, surtout, comment déclarer ce compte en France pour être en règle." }
        },
        {
          "@type": "Question",
          "name": "Faut-il déclarer mon compte aux impôts français ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Oui, c'est obligatoire. Un compte détenu à l'étranger se déclare via le formulaire 3916, sous peine d'une amende de 1 500 € par an. Les dividendes sont imposés au PFU (Flat Tax) de 31,4 %. Le guide détaille toute la démarche." }
        },
        {
          "@type": "Question",
          "name": "Les plus-values sont-elles imposées en France ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Oui, les plus-values réalisées à la vente d'actions BRVM sont imposables en France au taux de 31,4 % (Flat Tax, depuis 2026). En revanche, elles sont exonérées d'impôt dans la zone UEMOA. Le guide explique comment les déclarer correctement via le formulaire 2074." }
        },
        {
          "@type": "Question",
          "name": "Les chiffres sont-ils à jour ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Les données BRVM sont récupérées automatiquement chaque jour de bourse depuis brvm.org. Les cours et rendements évoluent : vérifie toujours les informations à jour auprès de ta SGI avant toute décision." }
        },
        {
          "@type": "Question",
          "name": "C'est un conseil en investissement ?",
          "acceptedAnswer": { "@type": "Answer", "text": "Non. DiaspoInvest fournit du contenu éducatif uniquement. Rien sur ce site ne constitue un conseil en investissement personnalisé. Investir comporte un risque de perte en capital." }
        }
      ]
    }
