    <!-- Mesure d'audience maison (sans cookie, RGPD) — compte visites + events -->
    <script>
      (function () {
        function send(name) {
          try {
            var body = JSON.stringify(name ? { e: name } : {})
            if (navigator.sendBeacon) navigator.sendBeacon('/api/stats', body)
            else fetch('/api/stats', { method: 'POST', body: body, keepalive: true })
          } catch (_) {}
        }
        send() // vue de page
        // Conserve les appels d'events existants : window.plausible('quiz_termine', {...})
        window.plausible = function (eventName) { send(eventName) }
      })()
    </script>
